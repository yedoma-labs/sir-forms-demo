# Default configuration in YAML format
# More human-readable than JSON!

app:
  name: Yedoma Labs Demo
  version: 0.3.0
  port: 3000

features:
  enableAnalytics: false
  enableLogging: true
  maxUploadSize: 5242880  # 5MB

api:
  baseUrl: http://localhost:3000/api
  timeout: 30000  # 30 seconds
  retries: 3

database:
  host: localhost
  port: 5432
  name: demo_db
  poolSize: 10

cache:
  ttl: 3600  # 1 hour
  maxSize: 100
